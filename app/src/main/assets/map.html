    var markers = [];
    var layerMap = {};

    L.geoJSON(geojsonData, {
        style: function(feature) {
            var id = feature.properties.id || '';
            var r = regionMap[id];
            return {
                color: '#ffffff',
                weight: 2,
                fillColor: r ? r.color : '#aaa',
                fillOpacity: 0.55,
                        bubblingMouseEvents: false
            };
        },
        onEachFeature: function(feature, layer) {
            var id = feature.properties.id || '';
            var r = regionMap[id];
            var name = r ? r.name : (feature.properties.na || id);
            layer.bindTooltip(name, { sticky: true, className: 'region-tooltip' });
            layerMap[name] = layer;
                    layer.on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                if (typeof Android !== 'undefined') Android.onRegionClick(name);
                    layer.setStyle({color: '#ffffff', weight: 2});
            });
        }
    }).addTo(map);

    function addMarker(lat, lng, username, region) {
        var color = '#607D8B';
        Object.values(regionMap).forEach(function(r) {
            if (r.name === region) color = r.color;
        });
        var m = L.circleMarker([lat, lng], {
            radius: 7, color: '#fff', fillColor: color, fillOpacity: 1, weight: 2
        });
        m.bindPopup('<b>' + username + '</b><br><small>' + region + '</small>');
        m.addTo(map);
        markers.push(m);
    }

    function highlightRegion(regionName) {
        Object.keys(layerMap).forEach(function(name) {
            var layer = layerMap[name];
            if (name === regionName) {
                layer.setStyle({color: "#FFD700", weight: 4, fillOpacity: 0.75});
            } else {
                layer.setStyle({color: "#ffffff", weight: 2, fillOpacity: 0.55});
            }
        });
    }

    function clearMarkers() {
        markers.forEach(function(m) { map.removeLayer(m); });
        markers = [];
    }
